#
# Description: Build Project using GitHub Actions
#

name: Build AX6 OpenWRT

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'SSH to Action'
        required: false
        default: 'false'
      repository:
        description: 'Repository URL'
        required: false
        default: 'https://github.com/jliveusa/lede'
      branch:
        description: 'Branch'
        required: false
        default: 'AX6'
      tag:
        description: 'Tag'
        required: false
        default: 'AX6'
      commit:
        description: 'Back to Commit'
        required: false
        default: ''
  schedule:
   - cron: '0 7 * * *'

env:
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: config/AX6.config
  DIY_P1_SH: scripts/diy.sh
  DIY_P2_SH: scripts/AX6.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_PKG_DIR: true
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq -y install $(curl -fsSL https://raw.githubusercontent.com/jliveusa/AutoWRT/main/config/depends-ubuntu)
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
        # set environment
        echo "COMMIT=${{ github.event.inputs.commit }}" >> $GITHUB_ENV
        echo "BRANCH=${{ github.event.inputs.branch }}" >> $GITHUB_ENV
        echo "REPO_URL=${{ github.event.inputs.repository }}" >> $GITHUB_ENV
        echo "TAG=${{ github.event.inputs.tag }}" >> $GITHUB_ENV
        
    - name: Remove old Releases
      uses: dev-drprasad/delete-tag-and-release@master
      #if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        #keep_latest: 8
        #delete_tags: true
        delete_release: true
        tag_name: AX6
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $BRANCH openwrt
        cd openwrt
        git checkout $COMMIT
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
              
    # - name: Load custom feeds
    #  run: |
    #    [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
    #    chmod +x $DIY_P1_SH
    #    cp -f $DIY_P1_SH openwrt/diy1.sh
    #    cd openwrt && ./diy1.sh

    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        # [ -e files ] && mv files openwrt/files && chmod -R 755 openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cp -f $DIY_P2_SH openwrt/AX6.sh
        cd openwrt && ./AX6.sh

    - name: SSH to Action
      uses: mxschmitt/action-tmate@master
      timeout-minutes: 30
      if: (github.event.inputs.ssh == 'true' && github.event.inputs.ssh  != 'false') || contains(github.event.action, 'ssh')
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    - name: Download package
      id: download
      run: |
        cd openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;
        
    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 V=s
        echo "::set-output name=status::success"
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Check space usage
      if: (!cancelled())
      run: df -hT
        
    - name: Upload bin directory
      uses: actions/upload-artifact@main
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin_${{ env.DEVICE_NAME }}_${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: Organize firmware
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "::set-output name=status::success"
        
    - name: Organize packages
      id: package
      if: steps.organize.outputs.status == 'success' && !cancelled()
      run: |
          cd openwrt/bin/packages
          echo "PACKAGES=$PWD" >> $GITHUB_ENV
          echo "::set-output name=status::success"       
    
    - name: Upload firmware directory
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware_${{ env.DEVICE_NAME }}_${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}      
    
    - name: Upload packages directory
      uses: actions/upload-artifact@main
      if: steps.package.outputs.status == 'success' && env.UPLOAD_PKG_DIR == 'true'
      with:
        name: OpenWrt_packages_${{ env.DEVICE_NAME }}_${{ env.FILE_DATE }}
        path: ${{ env.PACKAGES }}
          
    #- name: Generate release tag
    #  id: tag
    #  if: env.UPLOAD_RELEASE == 'true' && !cancelled()
    #  run: |
    #    echo "::set-output name=release_tag::$(date +"%Y.%m.%d-%H%M")"
    #    touch release.txt
    #    echo "::set-output name=status::success"

    - name: Upload firmware to release
      uses: softprops/action-gh-release@master
      #if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        #tag_name: ${{ steps.tag.outputs.release_tag }}
        tag_name: $TAG
        body_path: release.txt
        files: |
          ${{ env.FIRMWARE }}/*

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 1
        keep_minimum_runs: 1
